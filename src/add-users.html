</head>

    <div class="page-container">
          <div class="c-sidebar">

            <div class="c-sideba__control">

                    <svg viewbox="0 0 35 35">

                    <img src="../src/assets/images/profile.png" alt="">
                </a>
            </div>
            <div class="c-sideba__menu">
                <h2 class="c-sideba__title"><a href="./index.html">عربي</a></h2>
                <nav class="c-sideba__navigation">
                    <a href="./index.html" class="c-sideba__link">نظرة عامة <i class="c-icon c-icon--equalizer"></i></a>
                    <a href="./products.html" class="c-sideba__link">المنتجات<i class="c-icon c-icon--cart"></i></a>
                    <a href="./users.html" class="c-sideba__link">المستخدمين <i class="c-icon c-icon--users"></i></a>
                    <a href="./orders.html" class="c-sideba__link">الطلبات<i class="c-icon c-icon--file-text"></i></a>

        </div>
        <div class="single-page">
            
            <header class="page-header">
                <h1 class="page-title">اضافة مستخدم</h1>
                <button class="c-btn c-btn--primary" form="add-users" type="submit" name="submit">مستخدم جديد </button>
            </header>
            <form action="" class="c-form" name="add-users">
                        <div class="c-form__controls">

                     <div class="c-upload c-upload--small js-upload">
                            <header class="c-upload__header">
                              <h4 class="c-upload__title">صورة المستخدم</h4>
                            </header>
                         <div class="c-upload__body">
                             <label for="upload-image" class="c-upload__label">ارفع الصورة</label>
                              <img class="js-upload-placeholder">
                             <input type="file" name="upload-image" id="upload-image" class="c-upload-field js-upload-value" accept="image/*">
                         </div>
                         <span class="c-upload__label  c-upload__label--remove js-upload-remove">احذف الصورة</span>
                     </div>


                            <div class="c-form__row">
                                <div class="c-textfield">
                                <label for="usersnane" class="c-textfield__label">اسم المستخدم</label>
                                <input type="text" class="c-textfield__input" placeholder="" id="usersname" required="required">
                                <span class="c-textfield__hint"></span>
                                </div>
                            </div>
                            <div class="c-form__row">
                                <div class="c-textfield">
                                <label for="email" class="c-textfield__label">البريد </label>
                                <input type="email" class="c-textfield__input" placeholder="" id="email" required="required">
                                <span class="c-textfield__hint"></span>
                                </div>

                                 <div class="c-textfield">
                                <label for="email-2" class="c-textfield__label">  تأكيد البريد</label>
                                <input type="email" class="c-textfield__input" placeholder="" id="email-2" required="required">
                                <span class="c-textfield__hint"></span>
                                </div>
                            </div>
                            <div class="c-form__row">
                                <div class="c-textfield">
                                <label for="password" class="c-textfield__label">   كلمة المرور</label>
                                <input type="password" class="c-textfield__input" placeholder="" id="password" required="required">
                                <span class="c-textfield__hint"></span>
                                </div>
                            </div>
                             <div class="c-form__row">
                                <div class="c-textfield">
                                <label for="password-2" class="c-textfield__label">   تأكيد كلمة المرور </label>
                                <input type="password" class="c-textfield__input" placeholder="" id="password-2" required="required">
                                <span class="c-textfield__hint"></span>
                                </div>
                            </div>
                     </div>
                      
                            </div>
    </div>

                        
            </form>
            
        <div class="c-help">

            <div class="c-help__icon c-icon c-icon--lifebuoy"></div>   

            <div>
                <span class="c-help-title">تعلم المزيد حول  </span>
                <a href="../index.html" class="c-help-link">المنتجات</a>
            </div>
        </div>
        </div>
    
    </div>
    
</body>
</html>
