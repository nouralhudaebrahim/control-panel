<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>textfield Component's page</title>
</head>
<body>
    <div class="component-container">
        <div class="c-textfield">
            <label for="normal" class="c_textfield_label">مدخل عادي</label>
            <input type="text" class="c_textfield_input" placeholder="ادخل المحتوى" id="normal">

        </div>
        <div class="c-textfield">
            <label for="textarea" class="c_textfield_label">مدخل الفقرة</label>
            <textarea id="textarea" class="c_textfield_textarea" placeholder="ادخل المحتوى" ></textarea>
                <span class="c_textfield_hint">ملاحظات من اجل المدخل</span>
        </div>
    </div>
    
</body>
</html>
